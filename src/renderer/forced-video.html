<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' data: blob: 'unsafe-inline';" />
  <title>OpsLynk Forced Video</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; cursor: none !important; }

    html, body {
      width: 100vw; height: 100vh;
      overflow: hidden;
      background: #03060c;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #e8eefb;
      cursor: none !important;
    }

    /* Full-screen dark backdrop */
    .backdrop {
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse at 20% 30%, rgba(88,166,255,0.06) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 70%, rgba(139,125,255,0.05) 0%, transparent 55%),
        #03060c;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* Top bar — full width at very top */
    .topbar {
      position: fixed; top: 0; left: 0; right: 0;
      height: 42px;
      display: flex; align-items: center; gap: 10px;
      padding: 0 20px;
      background: rgba(6, 10, 20, 0.92);
      border-bottom: 1px solid rgba(88, 166, 255, 0.12);
      backdrop-filter: blur(12px);
      z-index: 100;
    }

    .live-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #ef4444;
      animation: blink 1.2s ease-in-out infinite;
      flex-shrink: 0;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: .35; transform: scale(.86); }
    }

    .title {
      font-size: 11px; font-weight: 800;
      letter-spacing: .14em; text-transform: uppercase;
      color: #b7d3ff;
    }

    .label {
      font-size: 10px; color: #9aa9c6; margin-left: 4px;
    }

    .force-chip {
      margin-left: auto;
      padding: 4px 10px; border-radius: 999px;
      background: rgba(239, 68, 68, 0.14);
      border: 1px solid rgba(239, 68, 68, 0.30);
      font-size: 10px; font-weight: 800;
      letter-spacing: .12em; text-transform: uppercase;
      color: #ffc8cf;
    }

    /* Video frame container — 80% of screen */
    .frame-wrapper {
      margin-top: 42px; /* below topbar */
      width: 100vw;
      height: calc(100vh - 42px);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .frame {
      width: 80%;
      height: 82%;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid rgba(88, 166, 255, 0.18);
      box-shadow:
        0 0 0 1px rgba(88, 166, 255, 0.06),
        0 8px 48px rgba(0, 0, 0, 0.7),
        0 0 80px rgba(88, 166, 255, 0.06);
      background: #000;
      position: relative;
      animation: framein .45s cubic-bezier(.175,.885,.32,1.275);
    }
    @keyframes framein {
      from { opacity: 0; transform: scale(.96); }
      to { opacity: 1; transform: scale(1); }
    }

    /* Subtle corner accent lines */
    .frame::before {
      content: '';
      position: absolute; inset: 0;
      border-radius: 16px;
      background: linear-gradient(135deg, rgba(88,166,255,0.08) 0%, transparent 40%);
      pointer-events: none; z-index: 2;
    }

    video {
      width: 100%; height: 100%;
      display: block;
      background: #000;
      object-fit: contain;
    }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="live-dot"></div>
    <div class="title" id="fromTitle">Forced video from Admin</div>
    <div class="label" id="videoLabel"></div>
    <div class="force-chip">Forced</div>
  </div>

  <div class="backdrop">
    <div class="frame-wrapper">
      <div class="frame">
        <video id="forcedVideo" playsinline autoplay></video>
      </div>
    </div>
  </div>

  <script>
    let activeUrl = null;

    function revokeCurrentUrl() {
      if (activeUrl) { URL.revokeObjectURL(activeUrl); activeUrl = null; }
    }

    function stopVideo() {
      const video = document.getElementById('forcedVideo');
      if (video) { video.pause(); video.removeAttribute('src'); video.load(); }
      revokeCurrentUrl();
    }

    // Block ALL keyboard input
    document.addEventListener('keydown', (e) => {
      e.preventDefault(); e.stopPropagation(); e.stopImmediatePropagation(); return false;
    }, true);

    document.addEventListener('keyup', (e) => {
      e.preventDefault(); e.stopPropagation(); e.stopImmediatePropagation(); return false;
    }, true);

    document.addEventListener('keypress', (e) => {
      e.preventDefault(); e.stopPropagation(); e.stopImmediatePropagation(); return false;
    }, true);

    // Block ALL mouse input
    document.addEventListener('mousedown', (e) => {
      e.preventDefault(); e.stopPropagation(); e.stopImmediatePropagation(); return false;
    }, true);

    document.addEventListener('mouseup', (e) => {
      e.preventDefault(); e.stopPropagation(); e.stopImmediatePropagation(); return false;
    }, true);

    document.addEventListener('click', (e) => {
      e.preventDefault(); e.stopPropagation(); e.stopImmediatePropagation(); return false;
    }, true);

    document.addEventListener('mousemove', (e) => {
      e.preventDefault(); e.stopPropagation(); e.stopImmediatePropagation(); return false;
    }, true);

    // Block scroll wheel
    document.addEventListener('wheel', (e) => {
      e.preventDefault(); e.stopPropagation(); e.stopImmediatePropagation(); return false;
    }, true);

    // Block context menu (right-click)
    document.addEventListener('contextmenu', (e) => {
      e.preventDefault(); return false;
    }, true);

    window.OpsLynk?.on('forced-video-data', data => {
      const from  = document.getElementById('fromTitle');
      const label = document.getElementById('videoLabel');
      const video = document.getElementById('forcedVideo');
      if (from)  from.textContent  = 'Forced video from ' + (data?.fromName || 'Admin');
      if (label) label.textContent = data?.label || '';
      if (!video || !data?.videoB64) return;
      stopVideo();
      const mime   = data?.mime || 'video/mp4';
      const binary = atob(data.videoB64);
      const bytes  = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      activeUrl  = URL.createObjectURL(new Blob([bytes], { type: mime }));
      video.src  = activeUrl;
      video.controls = false;
      video.loop     = true;
      video.play().catch(() => { video.controls = true; });
    });

    window.OpsLynk?.on('forced-video-stop', () => { stopVideo(); window.close(); });
  </script>
</body>
</html>
