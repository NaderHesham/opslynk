<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' data: blob: 'unsafe-inline';" />
  <title>OpsLynk Forced Video</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    html,
    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #03060c;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #e8eefb;
    }

    .shell {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      display: block;
      background: #000;
      overflow: hidden;
    }

    .frame {
      width: 100vw;
      height: 100vh;
      border-radius: 0;
      overflow: hidden;
      border: none;
      background: #000;
      box-shadow: none;
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      border-bottom: 1px solid rgba(88, 166, 255, 0.14);
      background: rgba(88, 166, 255, 0.08);
    }

    .live-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ef4444;
      animation: blink 1.2s ease-in-out infinite;
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1;
        transform: scale(1);
      }

      50% {
        opacity: .35;
        transform: scale(.86);
      }
    }

    .title {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: #b7d3ff;
    }

    .label {
      font-size: 10px;
      color: #9aa9c6;
      margin-left: 6px;
    }

    .force-chip {
      margin-left: auto;
      padding: 5px 9px;
      border-radius: 999px;
      background: rgba(239, 68, 68, 0.14);
      border: 1px solid rgba(239, 68, 68, 0.26);
      font-size: 10px;
      font-weight: 800;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: #ffc8cf;
    }

    video {
      width: 100%;
      height: calc(100vh - 42px);
      max-height: calc(100vh - 42px);
      display: block;
      background: #000;
    }
  </style>
</head>

<body>
  <div class="shell">
    <div class="frame">
      <div class="topbar">
        <div class="live-dot"></div>
        <div class="title" id="fromTitle">Forced video from Admin</div>
        <div class="label" id="videoLabel"></div>
        <div class="force-chip">Forced</div>
      </div>
      <video id="forcedVideo" playsinline autoplay></video>
    </div>
  </div>

  <script>
    let activeUrl = null;

    function revokeCurrentUrl() {
      if (activeUrl) {
        URL.revokeObjectURL(activeUrl);
        activeUrl = null;
      }
    }

    function stopVideo() {
      const video = document.getElementById('forcedVideo');
      if (video) {
        video.pause();
        video.removeAttribute('src');
        video.load();
      }
      revokeCurrentUrl();
    }

    window.addEventListener('keydown', e => {
      e.preventDefault();
      e.stopImmediatePropagation();
      return false;
    }, true);
    window.addEventListener('contextmenu', e => e.preventDefault(), true);

    window.OpsLynk?.on('forced-video-data', data => {
      const from = document.getElementById('fromTitle');
      const label = document.getElementById('videoLabel');
      const video = document.getElementById('forcedVideo');
      if (from) from.textContent = 'Forced video from ' + (data?.fromName || 'Admin');
      if (label) label.textContent = data?.label || '';
      if (!video || !data?.videoB64) return;
      stopVideo();
      const mime = data?.mime || 'video/mp4';
      const binary = atob(data.videoB64);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      activeUrl = URL.createObjectURL(new Blob([bytes], { type: mime }));
      video.src = activeUrl;
      video.controls = false;
      video.loop = true;
      video.play().catch(() => { video.controls = true; });
    });

    window.OpsLynk?.on('forced-video-stop', () => {
      stopVideo();
      window.close();
    });
  </script>
</body>

</html>
