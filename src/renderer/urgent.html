<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-font-smoothing:antialiased; }
body {
  font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
  background:radial-gradient(circle at center, rgba(127,29,29,0.22), rgba(0,0,0,0.96) 58%);
  height:100vh; display:flex; align-items:center; justify-content:center;
  overflow:hidden; user-select:none;
}
.overlay {
  width:min(920px, calc(100vw - 80px)); min-height:440px; background:linear-gradient(180deg,#1b1e28 0%, #13161f 100%);
  border:2px solid rgba(239,68,68,.55); border-radius:24px; padding:42px 46px;
  box-shadow:0 0 120px rgba(239,68,68,.26), 0 24px 80px rgba(0,0,0,.5);
  animation:emerge .35s cubic-bezier(.175,.885,.32,1.275);
  display:flex; flex-direction:column; justify-content:center;
}
@keyframes emerge {
  from { opacity:0; transform:scale(.88) translateY(20px); }
  to   { opacity:1; transform:scale(1) translateY(0); }
}
.badge-row {
  display:flex; align-items:center; gap:10px; margin-bottom:20px; flex-wrap:wrap;
}
.urgent-badge {
  background:rgba(239,68,68,.15); color:#ef4444; border:1px solid rgba(239,68,68,.3);
  font-size:12px; font-weight:800; letter-spacing:2px; padding:6px 12px; border-radius:999px;
  animation:pulse 1.4s ease infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.55} }
.from-label { font-size:14px; color:#9ca3af; }
.msg-icon { font-size:56px; margin-bottom:18px; }
.msg-text {
  font-size:32px; font-weight:700; color:#f3f4f6; line-height:1.35;
  margin-bottom:16px;
}
.lock-note {
  font-size:15px; line-height:1.7; color:#cfd6e4; margin-bottom:26px;
}
.reply-section { margin-bottom:22px; }
.reply-label { font-size:12px; font-weight:700; color:#9ca3af; text-transform:uppercase; letter-spacing:.8px; margin-bottom:10px; }
#reply-input {
  width:100%; background:#1c1f2a; border:1px solid #2d3347; color:#dde1ed;
  border-radius:14px; padding:14px 16px; font-family:inherit; font-size:15px; outline:none;
  transition:border-color .15s;
}
#reply-input:focus { border-color:#3d7ff5; }
#reply-input::placeholder { color:#404660; }
.action-row {
  display:flex; gap:14px; flex-wrap:wrap;
}
.btn-ack, .btn-secondary {
  height:64px; border:none; border-radius:16px; font-family:inherit; font-weight:800; font-size:18px;
  cursor:pointer; transition:background .15s, transform .15s; letter-spacing:.5px;
  display:flex; align-items:center; justify-content:center; gap:10px; padding:0 24px;
}
.btn-ack {
  flex:1 1 300px; background:#ef4444; color:#fff;
}
.btn-ack:hover { background:#dc2626; }
.btn-secondary {
  flex:0 0 auto; background:#232838; color:#dfe5f5; border:1px solid #31384d;
}
.btn-secondary:hover { background:#2a3044; }
.btn-ack:disabled, .btn-secondary:disabled { opacity:.65; cursor:default; transform:none; }
.status-line { font-size:13px; color:#6b7280; text-align:center; margin-top:14px; min-height:18px; }
</style>
</head>
<body>
<div class="overlay">
  <div class="badge-row">
    <span class="urgent-badge" id="mode-badge">URGENT BROADCAST</span>
    <span class="from-label" id="from-label">From: Admin</span>
  </div>
  <div class="msg-icon" id="msg-icon">!</div>
  <div class="msg-text" id="msg-text">Loading...</div>
  <div class="lock-note" id="lock-note">This message requires your acknowledgement before you can continue.</div>
  <div class="reply-section">
    <div class="reply-label">Reply To Admin</div>
    <input id="reply-input" placeholder="Type a reply to the admin (optional)...">
  </div>
  <div class="action-row" id="action-row">
    <button class="btn-ack" id="ack-btn" onclick="doAck()">Acknowledge And Dismiss</button>
    <button class="btn-secondary" id="reply-btn" onclick="sendReplyOnly()">Send Reply</button>
  </div>
  <div class="status-line" id="status-line">This screen stays active until you acknowledge it.</div>
</div>

<script>
let broadcastData = null;
let allowClose = false;

function getReplyText() {
  return document.getElementById('reply-input').value.trim();
}

function setStatus(message) {
  document.getElementById('status-line').textContent = message || '';
}

function updateUi() {
  document.getElementById('from-label').textContent = 'From: ' + (broadcastData?.fromName || 'Admin');
  document.getElementById('msg-text').textContent = broadcastData?.text || '';
  setStatus('This screen stays active until you acknowledge it.');
}

function playUrgent() {
  try {
    const ctx = new AudioContext();
    [330, 440, 550, 440, 330].forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.35, ctx.currentTime + i * 0.12);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.12 + 0.1);
      osc.start(ctx.currentTime + i * 0.12);
      osc.stop(ctx.currentTime + i * 0.12 + 0.12);
    });
  } catch {}
}

function sendReplyOnly() {
  if (!broadcastData || !window.OpsLynk) return;
  const reply = getReplyText();
  if (!reply) {
    setStatus('Write a reply first.');
    return;
  }
  window.OpsLynk.urgentReply({ peerId: broadcastData.fromId, text: reply, broadcastId: broadcastData.broadcastId });
  document.getElementById('reply-input').value = '';
  setStatus('Reply sent.');
}

function doAck() {
  if (!broadcastData) return;
  const reply = getReplyText();
  if (window.OpsLynk) {
    window.OpsLynk.urgentAck({ peerId: broadcastData.fromId, broadcastId: broadcastData.broadcastId });
    if (reply) {
      window.OpsLynk.urgentReply({ peerId: broadcastData.fromId, text: reply, broadcastId: broadcastData.broadcastId });
    }
  }
  allowClose = true;
  window.close();
}

if (window.OpsLynk) {
  window.OpsLynk.on('urgent-data', (data) => {
    broadcastData = data;
    updateUi();
    setTimeout(playUrgent, 300);
  });
}

window.addEventListener('beforeunload', (e) => {
  if (allowClose) return;
  e.preventDefault();
  e.returnValue = '';
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' || (e.altKey && e.key === 'F4')) e.preventDefault();
  if (e.key === 'Enter' && e.ctrlKey) doAck();
});
</script>
</body>
</html>
