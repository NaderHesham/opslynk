<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body {
  font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
  background:transparent;
  overflow:hidden;
}
.card {
  width:100vw; height:100vh;
  background:linear-gradient(180deg, rgba(26,30,41,.98), rgba(15,18,25,.98));
  color:#eef2ff;
  border:1px solid rgba(239,68,68,.30);
  border-radius:20px;
  box-shadow:0 20px 48px rgba(0,0,0,.5);
  padding:18px 18px 16px;
  display:flex;
  flex-direction:column;
  gap:12px;
}
.hdr { display:flex; align-items:flex-start; gap:12px; }
.icon {
  width:40px; height:40px; border-radius:12px;
  background:rgba(239,68,68,.15); border:1px solid rgba(239,68,68,.28);
  display:flex; align-items:center; justify-content:center; font-size:20px;
  flex-shrink:0;
}
.title { font-size:14px; font-weight:800; }
.meta { font-size:11px; color:#94a3b8; margin-top:3px; line-height:1.45; }
.badge {
  margin-left:auto;
  font-size:10px;
  font-weight:800;
  letter-spacing:.8px;
  padding:5px 8px;
  border-radius:999px;
  text-transform:uppercase;
}
.badge.low { background:rgba(16,185,129,.14); color:#10b981; }
.badge.medium { background:rgba(245,158,11,.16); color:#f59e0b; }
.badge.urgent { background:rgba(239,68,68,.18); color:#ef4444; }
.msg {
  flex:1;
  font-size:14px;
  line-height:1.6;
  color:#f8fafc;
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.04);
  border-radius:14px;
  padding:14px 15px;
}
.hint {
  font-size:11px;
  color:#94a3b8;
}
.actions { display:flex; gap:10px; }
.btn {
  height:40px;
  border:none;
  border-radius:11px;
  cursor:pointer;
  font-weight:800;
  font-size:12px;
}
.btn.secondary {
  flex:1;
  background:#171c27;
  color:#cbd5e1;
  border:1px solid #273044;
}
.btn.primary {
  flex:1.35;
  background:#ef4444;
  color:#fff;
}
</style>
</head>
<body>
  <div class="card">
    <div class="hdr">
      <div class="icon">🆘</div>
      <div style="flex:1;min-width:0;">
        <div class="title">New Help Request</div>
        <div class="meta" id="meta">Loading...</div>
      </div>
      <span class="badge medium" id="badge">MEDIUM</span>
    </div>
    <div class="msg" id="msg">Loading...</div>
    <div class="hint">This alert will keep sounding until you accept the ticket.</div>
    <div class="actions">
      <button class="btn secondary" onclick="openInApp()">Open in App</button>
      <button class="btn primary" onclick="acceptTicket()">Accept Ticket</button>
    </div>
  </div>

<script>
let payload = null;
let audioCtx = null;
let beepTimer = null;

function ensureAudioContext() {
  if (!audioCtx) audioCtx = new AudioContext();
  return audioCtx;
}

function beep(freq = 440, duration = 0.18, volume = 0.22) {
  try {
    const ctx = ensureAudioContext();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(volume, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    osc.start();
    osc.stop(ctx.currentTime + duration);
  } catch {}
}

function startLoop() {
  stopLoop();
  beep(330, 0.22, 0.28);
  setTimeout(() => beep(440, 0.2, 0.22), 160);
  beepTimer = setInterval(() => {
    beep(330, 0.22, 0.28);
    setTimeout(() => beep(440, 0.2, 0.22), 160);
  }, 1800);
}

function stopLoop() {
  if (beepTimer) {
    clearInterval(beepTimer);
    beepTimer = null;
  }
}

async function acceptTicket() {
  if (!payload) return;
  stopLoop();
  await window.OpsLynk?.ackHelp({ peerId: payload.fromId, reqId: payload.reqId });
  window.close();
}

function openInApp() {
  if (!payload) return;
  stopLoop();
  window.OpsLynk?.ackHelp({ peerId: payload.fromId, reqId: payload.reqId }).finally(() => window.close());
}

window.OpsLynk?.on('help-popup-data', (data) => {
  payload = data;
  const priority = (data.priority || 'medium').toLowerCase();
  const badge = document.getElementById('badge');
  badge.className = `badge ${priority}`;
  badge.textContent = priority.toUpperCase();
  document.getElementById('meta').textContent = `${data.username || 'User'} • ${data.machine || '-'} • ${new Date(data.timestamp || Date.now()).toLocaleTimeString()}`;
  document.getElementById('msg').textContent = data.description || '';
  startLoop();
});

window.addEventListener('beforeunload', stopLoop);
</script>
</body>
</html>
